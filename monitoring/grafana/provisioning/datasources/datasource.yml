apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    editable: true
  - name: VictoriaLogs
    type: victoriametrics-logs-datasource
    url: http://victorialogs:9428
    access: proxy
    editable: true
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true