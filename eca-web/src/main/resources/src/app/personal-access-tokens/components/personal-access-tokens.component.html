<div class="container-fluid mb-5">
  <div class="row">
    <div class="col-6 offset-3">

      <p-table
        class="personal-access-tokens-table"
        [columns]="columns"
        [value]="items"
        [rows]="pageSize"
        [paginator]="true"
        [sortField]="defaultSortField"
        [sortOrder]="defaultSortOrder"
        [lazy]="true"
        [loading]="loading"
        (onLazyLoad)="onLazyLoad($event)">

        <ng-template pTemplate="caption">
          <div class="mx-auto justify-content-start align-items-start d-flex">
            <button
              pButton
              label="Создать токен"
              icon="pi pi-plus"
              type="button"
              class="create-token-button" (click)="onCreateTokenDialogVisibility(true)">
            </button>
          </div>
        </ng-template>

        <ng-template pTemplate="header">
          <tr>
            <ng-container *ngFor="let column of columns">
              <th>{{ column.label }}</th>
            </ng-container>
            <th></th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
          <tr [ngClass]="{'item-blink': isBlink(item)}">
            <td *ngFor="let column of columns">
              <ng-container [ngSwitch]="column.name">
                <ng-container *ngSwitchCase="'expireDate'">
                  <span [class.text-danger]="!item.valid"
                        [class.text-success]="item.valid">
                        {{ getColumnValue(column.name, item) }}
                  </span>
                </ng-container>
                <ng-container *ngSwitchDefault>
                  {{ getColumnValue(column.name, item) }}
                </ng-container>
              </ng-container>
            </td>
            <td class="text-center">
              <button pButton
                      type="button"
                      class="ui-button-danger delete-button"
                      icon="pi pi-fw pi-trash"
                      (click)="onDeleteToken(item)">
              </button>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage" *ngIf="items.length == 0">
          <tr>
            <td [attr.colspan]="columns.length + 1" class="text-center">
              Не найдено ни одного токена
            </td>
          </tr>
        </ng-template>
      </p-table>

    </div>
  </div>
</div>

<app-create-personal-access-token (visibilityChange)="onCreateTokenDialogVisibility($event)"
                                  [visible]="createTokenDialogVisibility"
                                  [item]="createPersonalAccessTokenItem"
                                  (itemEvent)="onCreatedToken($event)">
</app-create-personal-access-token>


<app-confirm-dialog [visible]="tokenInfoDialogVisibility"
                    (closedEvent)="hideTokenInfoDialogVisibility()"
                    [header]="'Персональный токен доступа'"
                    [dialogWidth]="'650px'">
  <div content class="row">
    <div class="col-11">
      <div class="text-wrap">{{ token }}</div>
    </div>
    <div class="col-1">
      <button pButton
              type="button"
              class="ui-button-secondary mr-2"
              pTooltip="Скопировать"
              icon="pi pi-copy"
              (click)="copyToClipboard()">
      </button>
    </div>
  </div>
</app-confirm-dialog>
